DEBUG = false

task = "classification"
model = "medtsllm"

history_len = 512
pred_len = 512


[data]
dataset = "PTB-XL"
mode = "multivariate"
cols = "all"
normalize = true
step = 512


[training]
epochs = 10
batch_size = 16
optimizer = "adam"
learning_rate = 1e-4
dropout = 0.1
loss = "ce"
class_weights = false

eval_metric = "f1"
eval_metric_direction = "max"


[datasets.PTB-XL]
version = "v1"


[models.medtsllm]
d_model = 32
d_ff = 128
n_heads = 8
num_tokens = 1024
covariate_mode = "concat"
embedding_downsample_mode = "linear"

[models.medtsllm.patching]
patch_len = 32
stride = 16

[models.medtsllm.prompting]
dataset = true
clip = true
task = true
input_stats = false
examples = false
input_stats_dim = 0
input_stats_select = "all"
example_pool = 0

[models.medtsllm.llm]
enabled = true
llm = "meta-llama/Llama-2-7b-hf"
load_in_4bit = false
load_in_8bit = false
llm_layers = -1


[setup]
seed = 0
device = "auto"
dtype = "mixed"
num_workers = "auto"
logger = "wandb"
